name: Build Scry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15  # Apple Silicon M1 runner with Xcode 16+
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme scry-cli -destination 'platform=macOS,arch=arm64'

      - name: Build
        run: |
          xcodebuild build \
            -scheme scry-cli \
            -destination 'platform=macOS,arch=arm64' \
            -skipMacroValidation \
            2>&1 | tail -50

      - name: Locate binary
        id: binary
        run: |
          BUILD_DIR=$(xcodebuild -scheme scry-cli -showBuildSettings 2>/dev/null \
            | grep ' BUILT_PRODUCTS_DIR' | head -1 | sed 's/.*= //')
          echo "path=$BUILD_DIR/scry-cli" >> "$GITHUB_OUTPUT"
          ls -la "$BUILD_DIR/scry-cli"

      - name: Smoke test
        run: |
          "${{ steps.binary.outputs.path }}" --help
