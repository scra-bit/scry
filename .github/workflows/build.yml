name: Build Scry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15  # Apple Silicon M1 runner with Xcode 16+
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve packages
        run: swift package resolve

      - name: Build
        run: |
          set -o pipefail
          swift build --product scry 2>&1 | tail -200

      - name: Smoke test
        run: |
          "$(swift build --product scry --show-bin-path)/scry" --help
